<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borno schools & conflict map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>html,body,#map{height:100%;margin:0;padding:0}</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Basic Leaflet map to show borno_schools.geojson and an optional borno_conflict.geojson
const map = L.map('map').setView([12.0, 13.0], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const schoolStyle = {
  radius: 5,
  fillColor: '#2b8cbe',
  color: '#ffffff',
  weight: 1,
  opacity: 1,
  fillOpacity: 0.8
};

const conflictStyle = {
  radius: 6,
  fillColor: '#de2d26',
  color: '#800026',
  weight: 1,
  opacity: 1,
  fillOpacity: 0.9
};

let schoolsLayer, conflictLayer;

// load schools GeoJSON (created from OSM)
fetch('borno_schools.geojson').then(r => {
  if (!r.ok) throw new Error('borno_schools.geojson not found');
  return r.json();
}).then(data => {
  schoolsLayer = L.geoJSON(data, {
    pointToLayer: function(feature, latlng){
      return L.circleMarker(latlng, schoolStyle);
    },
    onEachFeature: function(feature, layer){
      const p = feature.properties || {};
      const name = p.name || p['name:en'] || p['ref'] || ('OSM id:'+p.id);
      const type = p.osm_type || '';
      layer.bindPopup('<b>School</b><br/>' + name + '<br/>' + type);
    }
  }).addTo(map);
  map.fitBounds(schoolsLayer.getBounds(), {maxZoom: 12});
}).catch(err => {
  console.warn(err);
  const el = document.createElement('div');
  el.style.position='absolute'; el.style.top='8px'; el.style.left='8px'; el.style.padding='6px'; el.style.background='rgba(255,255,255,0.9)';
  el.innerHTML = 'borno_schools.geojson not found. Make sure the file is in the same folder and serve this page with a local web server.';
  document.body.appendChild(el);
});

// try to load conflict layer if present
fetch('borno_conflict.geojson').then(r => {
  if (!r.ok) throw new Error('no conflict file');
  return r.json();
}).then(data => {
  conflictLayer = L.geoJSON(data, {
    pointToLayer: function(feature, latlng){
      return L.circleMarker(latlng, conflictStyle);
    },
    onEachFeature: function(feature, layer){
      const p = feature.properties || {};
      const desc = p.event_type || p.type || p.note || JSON.stringify(p);
      layer.bindPopup('<b>Conflict event</b><br/>' + desc);
    }
  }).addTo(map);
}).catch(()=>{ console.log('No borno_conflict.geojson found; place conflict GeoJSON in same folder to show events.'); });

// layers control (if both exist)
const overlays = {};
if (typeof schoolsLayer !== 'undefined') overlays['Schools'] = schoolsLayer;
if (typeof conflictLayer !== 'undefined') overlays['Conflict events'] = conflictLayer;
L.control.layers(null, overlays).addTo(map);
</script>
</body>
</html>
